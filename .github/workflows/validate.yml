name: Validate

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "schemas/**"
      - "resources/**"
      - "scripts/**"
      - "site/**"
      - "package.json"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run validation
        run: bun run check
