name: Scheduled Ingest

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run subscription ingestion
        id: ingest
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          INGEST_SCOPE: subscriptions
        run: |
          output=$(bun run ingest 2>&1)
          echo "$output"
          quota=$(echo "$output" | grep '^INGEST_QUOTA_TOTAL=' | cut -d= -f2)
          echo "quota=${quota:-0}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Generate guide
        env:
          GUIDE_DATE: ${{ steps.ingest.outputs.date }}
        run: bun run generate-guide

      - name: Generate daily receipt
        env:
          RECEIPT_DATE: ${{ steps.ingest.outputs.date }}
          RECEIPT_PERIOD: day
        run: bun run generate-receipt

      - name: Generate weekly receipt (Sunday only)
        if: contains('0', github.event.schedule && '0' || '0')
        env:
          RECEIPT_DATE: ${{ steps.ingest.outputs.date }}
          RECEIPT_PERIOD: week
        run: |
          day_of_week=$(date -u +%u)
          if [ "$day_of_week" = "7" ]; then
            bun run generate-receipt
          else
            echo "Skipping weekly receipt (not Sunday)"
          fi

      - name: Check for resource changes
        id: changes
        run: |
          if git diff --quiet resources/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated resources
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resources/
          git commit -m "ingest: subscriptions (${{ steps.ingest.outputs.date }}, ${{ steps.ingest.outputs.quota }} quota units)"
          git push
