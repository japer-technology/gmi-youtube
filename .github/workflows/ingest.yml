name: Ingest

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "Ingestion scope (e.g. subscriptions, channel:<id>)"
        required: false
        default: "subscriptions"
        type: string

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run ingestion
        id: ingest
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          INGEST_SCOPE: ${{ inputs.scope }}
        run: |
          output=$(bun run ingest 2>&1)
          echo "$output"
          quota=$(echo "$output" | grep '^INGEST_QUOTA_TOTAL=' | cut -d= -f2)
          echo "quota=${quota:-0}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Generate guide
        env:
          GUIDE_DATE: ${{ steps.ingest.outputs.date }}
        run: bun run generate-guide

      - name: Check for resource changes
        id: changes
        run: |
          if git diff --quiet resources/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated resources
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resources/
          git commit -m "ingest: ${{ inputs.scope }} (${{ steps.ingest.outputs.date }}, ${{ steps.ingest.outputs.quota }} quota units)"
          git push
