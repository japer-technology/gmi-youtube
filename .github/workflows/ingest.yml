name: Ingest

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "Ingestion scope (e.g. subscriptions, channel:<id>)"
        required: false
        default: "subscriptions"
        type: string

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run ingestion
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          INGEST_SCOPE: ${{ inputs.scope }}
        run: bun run ingest

      - name: Check for resource changes
        id: changes
        run: |
          if git diff --quiet resources/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated resources
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resources/
          git commit -m "ingest: update resources (${{ inputs.scope }})"
          git push
