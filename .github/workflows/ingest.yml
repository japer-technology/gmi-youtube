name: Ingest

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "Ingestion scope (e.g. subscriptions, channel:<id>). Leave empty to auto-detect from YOUTUBE_CHANNEL_ID."
        required: false
        default: ""
        type: string

permissions:
  contents: write
  actions: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run ingestion
        id: ingest
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          INGEST_SCOPE: ${{ inputs.scope }}
        run: |
          set +e
          output=$(bun run ingest 2>&1)
          exit_code=$?
          set -e
          echo "$output"
          if [ $exit_code -ne 0 ]; then
            echo "::error::Ingestion failed with exit code $exit_code"
            exit $exit_code
          fi
          quota=$(echo "$output" | grep '^INGEST_QUOTA_TOTAL=' | cut -d= -f2)
          echo "quota=${quota:-0}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Generate guide
        if: success()
        continue-on-error: true
        env:
          GUIDE_DATE: ${{ steps.ingest.outputs.date }}
        run: bun run generate-guide

      - name: Generate daily receipt
        if: success()
        continue-on-error: true
        env:
          RECEIPT_DATE: ${{ steps.ingest.outputs.date }}
          RECEIPT_PERIOD: day
        run: bun run generate-receipt

      - name: Check for resource changes
        id: changes
        run: |
          if git diff --quiet resources/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated resources
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add resources/
          git commit -m "ingest: ${{ inputs.scope || 'auto' }} (${{ steps.ingest.outputs.date }}, ${{ steps.ingest.outputs.quota }} quota units)"
          git push
