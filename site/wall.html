<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Channel Wall — Station</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-screen-role="wall">
  <header>
    <h1>Station</h1>
    <p>Channel Wall</p>
    <nav>
      <a href="index.html">Home</a>
      <a href="guide.html">Guide</a>
      <a href="wall.html" class="active">Channel Wall</a>
      <a href="receipt.html">Receipts</a>
      <a href="search.html">Search</a>
      <a href="curator.html">Curator</a>
    </nav>
  </header>

  <main>
    <section id="wall">
      <h2>Channel Wall</h2>
      <p>A configurable channel matrix for rapid situational awareness.</p>

      <div id="wall-controls">
        <div class="wall-layout-switcher">
          <label for="wall-layout-select">Layout:</label>
          <select id="wall-layout-select"></select>
        </div>
        <div class="wall-playback-pref">
          <label>
            <input type="checkbox" id="wall-embed-toggle"> Embed players
          </label>
          <label>
            <input type="checkbox" id="wall-autoplay-toggle"> Autoplay
          </label>
        </div>
      </div>

      <div id="channel-wall">
        <p class="placeholder">Loading channel data…</p>
      </div>
    </section>
  </main>

  <footer>
    <p>Built from repository resources. Inspectable, portable, and yours.</p>
  </footer>

  <script src="station.js"></script>
</body>
</html>
