<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Guide — Station</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Station</h1>
    <p>TV Guide</p>
    <nav>
      <a href="index.html">Home</a>
      <a href="guide.html" class="active">Guide</a>
      <a href="wall.html">Channel Wall</a>
      <a href="receipt.html">Receipts</a>
      <a href="search.html">Search</a>
    </nav>
  </header>

  <main>
    <section id="guide">
      <h2>Programme Guide</h2>
      <p>A time-based view of what is on, what is next, and what aired recently.</p>

      <div id="guide-date-nav" class="guide-date-nav">
        <button id="guide-prev" class="guide-nav-btn" aria-label="Previous day">◀</button>
        <span id="guide-date-label" class="guide-date-label"></span>
        <button id="guide-next" class="guide-nav-btn" aria-label="Next day">▶</button>
      </div>

      <div id="guide-grid">
        <p class="placeholder">Loading guide data…</p>
      </div>
    </section>
  </main>

  <footer>
    <p>Built from repository resources. Inspectable, portable, and yours.</p>
  </footer>

  <script src="station.js"></script>
</body>
</html>
